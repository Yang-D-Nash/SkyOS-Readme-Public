# Detekt 2 — https://detekt.dev  (dev.detekt Gradle plugin 2.0.0-alpha.x)
# Goals: unbenutzte Symbole / klare Smells; keine Blockade durch reine Länge- oder Komplexitäts-Metriken.
# Ausführen: ./gradlew detektAll   (HTML: androidApp/build/reports/detekt/detekt.html u. a.)
#
# Bemerkung: `ignoreFailures` ist in androidApp + shared build.gradle.kts true, solange der Fundus groß ist.

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable
  TopLevelPropertyNaming:
    active: false
  MatchingDeclarationName:
    active: false

complexity:
  CyclomaticComplexMethod:
    active: false
  LongMethod:
    active: false
  TooManyFunctions:
    active: false
  LargeClass:
    active: false
  ComplexCondition:
    active: false
  LongParameterList:
    active: false
  NestedBlockDepth:
    active: false
  StringLiteralDuplication:
    active: false

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  # Unbenutzte Symbole (Parameter, ggf. Private) bleiben aktiv; siehe Konsolenausgabe / HTML-Report

exceptions:
  # Viele Stellen fangen bewusst `Exception` für Resilience — nicht Fokus „tote Reste“
  TooGenericExceptionCaught:
    active: false
