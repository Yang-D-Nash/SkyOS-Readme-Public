name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Centralized path groups used by change detection.
# Keep these broad enough to avoid accidental false negatives.
jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      android: ${{ steps.filter.outputs.android }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'shared/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'
            android:
              - 'androidApp/**'
              - 'shared/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'
            functions:
              - 'functions/**'

      - name: Publish change summary
        run: |
          {
            echo "## CI change detection"
            echo ""
            echo "- shared: \`${{ steps.filter.outputs.shared }}\`"
            echo "- android: \`${{ steps.filter.outputs.android }}\`"
            echo "- functions: \`${{ steps.filter.outputs.functions }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Shared KMP tests are expensive and run only when shared-relevant paths change.
  shared-tests:
    name: Shared allTests
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared tests (KMP)
        run: ./gradlew :shared:allTests --no-daemon

  # Android lint gate runs when Android or shared sources may be affected.
  android-lint:
    name: Android quality gate
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android lint and shared metadata compile
        run: ./gradlew :androidApp:lintDebug :shared:compileKotlinMetadata --no-daemon

      - name: Upload Android lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: androidApp/build/reports/lint-results-debug.*

  functions-tests:
    name: Firebase Functions tests
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Final gate summary always runs to provide a single PR-facing status view.
  ci-summary:
    name: CI gate summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - shared-tests
      - android-lint
      - functions-tests
    if: always()
    steps:
      - name: Publish CI gate summary
        run: |
          {
            echo "## CI gate results"
            echo ""
            echo "### Areas changed"
            echo "- shared: \`${{ needs.changes.outputs.shared }}\`"
            echo "- android: \`${{ needs.changes.outputs.android }}\`"
            echo "- functions: \`${{ needs.changes.outputs.functions }}\`"
            echo ""
            echo "### Job outcomes"
            echo "- shared-tests: \`${{ needs.shared-tests.result }}\`"
            echo "- android-lint: \`${{ needs.android-lint.result }}\`"
            echo "- functions-tests: \`${{ needs.functions-tests.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
