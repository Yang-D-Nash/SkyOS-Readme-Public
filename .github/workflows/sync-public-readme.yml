name: Sync public README

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-readme:
    name: Mirror README to public repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4

      - name: Validate sync configuration
        env:
          TARGET_REPO: Yang-D-Nash/SkyOS-Readme-Public
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_README_SOURCE: README.md
        run: |
          if [ -z "$TARGET_REPO" ]; then
            echo "Missing target repository configuration." >&2
            exit 1
          fi

          if [ -z "$TOKEN" ]; then
            echo "Missing secret PUBLIC_REPO_TOKEN." >&2
            exit 1
          fi

          if [ ! -f "$PUBLIC_README_SOURCE" ]; then
            echo "Missing public README source: $PUBLIC_README_SOURCE" >&2
            exit 1
          fi

      - name: Push README to public repository
        env:
          TARGET_REPO: Yang-D-Nash/SkyOS-Readme-Public
          TARGET_BRANCH: ${{ vars.PUBLIC_README_BRANCH }}
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_README_SOURCE: README.md
        run: |
          branch="${TARGET_BRANCH:-main}"
          clone_url="https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          git clone --depth 1 --branch "${branch}" "${clone_url}" public-readme
          python3 - <<'PY'
          import os
          import re
          import shutil
          from pathlib import Path
          from urllib.parse import urlparse

          private_root = Path(".").resolve()
          public_root = (private_root / "public-readme").resolve()
          readme_path = (private_root / os.environ["PUBLIC_README_SOURCE"]).resolve()

          markdown_link_pattern = re.compile(r"\[[^\]]+\]\(([^)]+)\)")
          html_attr_pattern = re.compile(r"""(?:src|href)\s*=\s*["']([^"']+)["']""", re.IGNORECASE)

          def is_remote_link(link: str) -> bool:
            parsed = urlparse(link)
            return parsed.scheme in {"http", "https", "mailto", "tel"}

          def sanitize_link(raw_link: str) -> str:
            cleaned = raw_link.strip()
            if cleaned.startswith("<") and cleaned.endswith(">"):
              cleaned = cleaned[1:-1].strip()
            if " " in cleaned and not cleaned.startswith("./") and not cleaned.startswith("../"):
              cleaned = cleaned.split(" ", 1)[0]
            return cleaned

          def resolve_target(base_file: Path, raw_link: str):
            link = sanitize_link(raw_link)
            if not link or link.startswith("#") or is_remote_link(link):
              return None

            link = link.split("#", 1)[0].split("?", 1)[0]
            if not link:
              return None

            target = (base_file.parent / link).resolve()
            try:
              target.relative_to(private_root)
            except ValueError:
              return None
            return target

          def copy_target(target: Path):
            rel = target.relative_to(private_root)
            dest = public_root / rel
            if target.is_dir():
              if dest.exists():
                shutil.rmtree(dest)
              shutil.copytree(target, dest)
            elif target.is_file():
              dest.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(target, dest)

          # Reset public mirror contents except .git
          for child in public_root.iterdir():
            if child.name == ".git":
              continue
            if child.is_dir():
              shutil.rmtree(child)
            else:
              child.unlink()

          # Always copy root README first
          (public_root / "README.md").write_text(readme_path.read_text(encoding="utf-8"), encoding="utf-8")

          to_scan = [readme_path]
          scanned = set()
          copied = {readme_path}

          while to_scan:
            current = to_scan.pop()
            if current in scanned or not current.exists() or not current.is_file():
              continue
            scanned.add(current)

            text = current.read_text(encoding="utf-8", errors="ignore")
            links = markdown_link_pattern.findall(text) + html_attr_pattern.findall(text)
            for raw in links:
              target = resolve_target(current, raw)
              if target is None or not target.exists():
                continue

              if target not in copied:
                copy_target(target)
                copied.add(target)

              if target.is_file() and target.suffix.lower() in {".md", ".markdown"}:
                to_scan.append(target)

          print(f"Mirrored {len(copied)} linked paths.")
          PY

          cd public-readme
          if git diff --quiet; then
            echo "README already up to date."
            exit 0
          fi

          git config user.name "readme-sync-bot"
          git config user.email "readme-sync-bot@users.noreply.github.com"

          git add -A
          git commit -m "Sync public README mirror from private repository"
          git push origin "${branch}"
