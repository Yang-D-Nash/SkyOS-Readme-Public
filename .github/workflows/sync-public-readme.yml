name: Sync public README

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/sync-public-readme.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-readme:
    name: Mirror README to public repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4

      - name: Validate sync configuration
        env:
          TARGET_REPO: Yang-D-Nash/SkyOS-Readme-Public
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$TARGET_REPO" ]; then
            echo "Missing target repository configuration." >&2
            exit 1
          fi

          if [ -z "$TOKEN" ]; then
            echo "Missing secret PUBLIC_REPO_TOKEN." >&2
            exit 1
          fi

      - name: Push README to public repository
        env:
          TARGET_REPO: Yang-D-Nash/SkyOS-Readme-Public
          TARGET_BRANCH: ${{ vars.PUBLIC_README_BRANCH }}
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          branch="${TARGET_BRANCH:-main}"
          clone_url="https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git"

          git clone --depth 1 --branch "${branch}" "${clone_url}" public-readme
          cp README.md public-readme/README.md

          cd public-readme
          if git diff --quiet -- README.md; then
            echo "README already up to date."
            exit 0
          fi

          git config user.name "readme-sync-bot"
          git config user.email "readme-sync-bot@users.noreply.github.com"

          git add README.md
          git commit -m "Sync README from private repository"
          git push origin "${branch}"
